name = "hns-auth"
main = "src/index.ts"
compatibility_date = "2026-04-11"
compatibility_flags = ["nodejs_compat"]

# Use the same D1 database as the bot Worker (copy database_id from root wrangler.toml).
[[d1_databases]]
binding = "DB"
database_name = "hns-bot-db"
database_id = "4b4b1a3d-44bf-42c7-9522-e0a50c6b4f52"

[vars]
BASE_URL = "https://h4cknstack.com"
DISCORD_GUILD_ID="1387695542934437979"
DISCORD_CLIENT_ID="1475217166558298303"
# Optional: set cookie Domain=.h4cknstack.com in production (omit on localhost)
# COOKIE_DOMAIN = ".h4cknstack.com"

# Secrets (do not commit):
#   wrangler secret put DISCORD_CLIENT_SECRET
#   wrangler secret put SESSION_SECRET   # 64-char hex = 32 bytes
